<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Firmas AMITAI</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f7fb;
}

.page {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.header {
  text-align:center;
  margin-bottom:30px;
}

.header img {
  width:140px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:14px;
}

input, select {
  width:100%;
  padding:10px;
  margin-bottom:12px;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  cursor:pointer;
}

.primary {
  background:#003c71;
  color:#fff;
}

.signature-box {
  border:1px dashed #ccc;
  padding:20px;
}
</style>
</head>

<body>

<div class="page">

<div class="header">
  <img src="media/logo-amitai.png">
  <h2>Generador de Firmas AMITAI</h2>
</div>

<div class="grid">

<div class="card">

<input id="name" placeholder="Nombre" value="Juan Palao García" oninput="updateSignature()">
<input id="position" placeholder="Puesto" value="Gerente de Marketing" oninput="updateSignature()">
<input id="email" placeholder="Correo" value="juan@amitai.com" oninput="updateSignature()">
<input id="phone" placeholder="Teléfono" value="+52 55 0000 0000" oninput="updateSignature()">
<input id="country" placeholder="País" value="México" oninput="updateSignature()">

<select id="banner" onchange="updateSignature()">
  <option value="ethics">Ethics Learning</option>
  <option value="empresas">Empresas Más Éticas</option>
  <option value="none">Sin banner</option>
</select>

<button class="primary" onclick="copySignature()">Copiar firma</button>

</div>

<div class="card">
<div class="signature-box" id="signature"></div>
</div>

</div>
</div>

<script>

const logoUrl = "media/logo-amitai.png";

const banners = {
  ethics: {
    img: "media/banner-ethics.gif",
    link: "https://www.amitai.com/es/ethics-learning/"
  },
  empresas: {
    img: "media/banner-empresas.png",
    link: "https://www.empresasmaseticas.com/"
  },
  none: null
};

function getSignatureHTML() {

  const name = document.getElementById("name").value;
  const position = document.getElementById("position").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const country = document.getElementById("country").value;
  const banner = banners[document.getElementById("banner").value];

  const bannerHTML = banner ? `
  <tr>
    <td>
      <a href="${banner.link}" target="_blank">
        <img src="${banner.img}" style="width:520px; max-width:100%;">
      </a>
    </td>
  </tr>` : "";

  return `
  <table style="font-family:Arial; max-width:520px;">
    
    ${bannerHTML}

    <tr>
      <td>
        <table>
          <tr>
            <td style="padding-right:15px;">
              <img src="${logoUrl}" style="width:110px;">
            </td>

            <td style="border-left:2px solid #003c71; padding-left:15px;">
              <strong style="color:#003c71;">${name}</strong><br>
              ${position}<br><br>

              <a href="mailto:${email}">${email}</a><br>
              ${phone}<br>
              ${country}<br><br>

              <a href="https://www.amitai.com/">www.amitai.com</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>

  </table>`;
}

function updateSignature() {
  document.getElementById("signature").innerHTML = getSignatureHTML();
}

function copySignature() {
  const el = document.getElementById("signature");
  const range = document.createRange();
  range.selectNode(el);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand("copy");
  alert("Firma copiada");
}

updateSignature();

</script>

</body>
</html>
