<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Firmas AMITAI</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; color: #1d2433; }
    .page { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
    .header { text-align: center; margin-bottom: 36px; }
    .header img { width: 150px; margin-bottom: 18px; }
    .header h1 { margin: 0; font-size: 32px; color: #003c71; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    .card { background: #ffffff; border-radius: 18px; padding: 28px; box-shadow: 0 14px 40px rgba(0,60,113,0.08); }
    label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #003c71; }
    input, select { width: 100%; padding: 12px 14px; margin-bottom: 16px; border: 1px solid #d0d5dd; border-radius: 10px; box-sizing: border-box; }
    button { width: 100%; border: none; border-radius: 12px; padding: 14px 18px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .primary { background: #003c71; color: white; }
    .secondary { background: #eaf3fb; color: #003c71; }
    .signature-box { border: 1px dashed #ccd6e0; padding: 22px; border-radius: 14px; background: #fff; }
    @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="page">
    <div class="header">
      <img src="https://amitaisignaturegenerator.netlify.app/media/logo-amitai.png">
      <h1>Generador de Firmas AMITAI</h1>
    </div>
    <div class="grid">
      <section class="card">
        <label>Nombre completo</label>
        <input id="name" value="Juan Palao García" oninput="updateSignature()" />

        <label>Puesto</label>
        <input id="position" value="Gerente de Marketing" oninput="updateSignature()" />

        <label>Empresa / División</label>
        <input id="company" value="AMITAI LATAM" oninput="updateSignature()" />

        <label>Correo</label>
        <input id="email" value="juan.palao@amitai.com" oninput="updateSignature()" />

        <label>Teléfono</label>
        <input id="phone" value="+52 55 0000 0000" oninput="updateSignature()" />

        <label>Ubicación / Oficina</label>
        <input id="country" value="México" oninput="updateSignature()" />

        <label>Banner</label>
        <select id="banner" onchange="updateSignature()">
          <option value="https://amitaisignaturegenerator.netlify.app/media/banner-mail.gif">
            Banner Ethics Learning
          </option>
          <option value="https://amitaisignaturegenerator.netlify.app/media/e+ebanner.gif">
            Banner Empresas Más Éticas
          </option>
        </select>

        <button class="primary" onclick="copySignature()">Copiar firma</button>
        <button class="secondary" onclick="copyHTML()">Copiar HTML</button>
      </section>

      <section class="card">
        <div class="signature-box">
          <div id="signature"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const logoUrl    = "https://amitaisignaturegenerator.netlify.app/media/logo-amitai.png";
    const bannerLink = "https://www.amitai.com/es/ethics-learning/";

    function getSignatureHTML() {
      const name      = document.getElementById("name").value;
      const position  = document.getElementById("position").value;
      const company   = document.getElementById("company").value;
      const email     = document.getElementById("email").value;
      const phone     = document.getElementById("phone").value;
      const country   = document.getElementById("country").value;
      const bannerUrl = document.getElementById("banner").value;

      return `
        <table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial; max-width:560px;">

          <!-- BANNER -->
          <tr>
            <td style="padding-bottom:12px;">
              <a href="${bannerLink}" target="_blank">
                <img src="${bannerUrl}" style="width:520px; max-width:100%;">
              </a>
            </td>
          </tr>

          <!-- FIRMA -->
          <tr>
            <td>
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>

                  <!-- LOGO -->
                  <td style="padding-right:16px; vertical-align:middle;">
                    <img src="${logoUrl}" style="width:100px; display:block;">
                  </td>

                  <!-- NOMBRE + PUESTO + EMPRESA -->
                  <td style="padding-right:16px; vertical-align:middle;">
                    <div style="font-size:14px; font-weight:700; color:#003c71;">${name}</div>
                    <div style="font-size:13px; color:#555; margin-top:3px;">${position}</div>
                    <div style="font-size:13px; color:#555; margin-top:2px;">${company}</div>
                  </td>

                  <!-- PLECA -->
                  <td style="width:1px; background:#003c71; padding:0; margin:0;">&nbsp;</td>

                  <!-- CONTACTO -->
                  <td style="padding-left:16px; vertical-align:middle;">
                    <div style="font-size:13px; margin-bottom:4px;">
                      📞 <a href="tel:${phone}" style="color:#1d2433; text-decoration:none;">${phone}</a>
                    </div>
                    <div style="font-size:13px; margin-bottom:4px;">
                      ✉️ <a href="mailto:${email}" style="color:#003c71; text-decoration:none;">${email}</a>
                    </div>
                    <div style="font-size:13px; margin-bottom:4px;">
                      🔗 <a href="https://www.amitai.com/" style="color:#003c71; text-decoration:none;">www.amitai.com</a>
                    </div>
                    <div style="font-size:13px;">
                      📍 ${country}
                    </div>
                  </td>

                </tr>
              </table>
            </td>
          </tr>

        </table>
      `;
    }

    function updateSignature() {
      document.getElementById("signature").innerHTML = getSignatureHTML();
    }

    function copySignature() {
      const el = document.getElementById("signature");
      const range = document.createRange();
      range.selectNode(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand("copy");
      alert("Firma copiada");
    }

    function copyHTML() {
      navigator.clipboard.writeText(getSignatureHTML());
      alert("HTML copiado");
    }

    updateSignature();
  </script>
</body>
</html>
